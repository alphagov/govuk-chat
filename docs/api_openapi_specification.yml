openapi: "3.0.4"
info:
  title: GOV.UK Chat API
  description: |
    Initial, proof of concept of documenting what an API for GOV.UK Chat
    could be that reflects current system modelling.
    It is intended to help shape chats with the app team about capabilities
    of chat in app and inform design decisions.

    Worth noting that onboarding aspects of conversation (Informing user of
    limitations and accepting) are not included as within GOV.UK Chat these
    are a UI construct and not a part of core domain constructs.
  version: "0.1.0"
servers:
  - url: https://chat.publishing.service.gov.uk/api/v0
paths:
  /conversation:
    post:
      summary: Start conversation
      description: Create a conversation by posting an initial question
      parameters:
        - $ref: "#/components/parameters/DeviceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UserQuestion"
      responses:
        "201":
          description: Successfully created first question in a conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingQuestion"
          headers:
            - $ref: "#/components/headers/WriteRateLimitHeaders"
        "422":
          description: |
            Validation error on question submission (such as PII in question)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
          headers:
            - $ref: "#/components/headers/WriteRateLimitHeaders"
        "429":
          $ref: "#/components/responses/TooManyWriteRequests"

  /conversation/{conversation_id}:
    get:
      summary: Retrieve a conversation
      description: |
        Accesses the questions of a conversation should a conversation with
        the id be available.
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/DeviceIdHeader"
      responses:
        "200":
          description: |
            Returns a list of AnsweredQuestions with potentially one PendingQuestion.
            Is limited to returning 500 questions for a conversation and only
            questions asked within last 30 days.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
          headers:
            - $ref: "#/components/headers/ReadRateLimitHeaders"
        "404":
          description: |
            Either a conversation never existed with this id or has now expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          headers:
            - $ref: "#/components/headers/ReadRateLimitHeaders"
        "429":
          $ref: "#/components/responses/TooManyReadRequests"

    put:
      summary: Update a conversation with a new question
      description: |
        Add an additional question to a conversation, requires a conversation
        to not have a pending question.
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/DeviceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UserQuestion"
      responses:
        "201":
          description: Successfully added a new question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingQuestion"
          headers:
            - $ref: "#/components/headers/WriteRateLimitHeaders"
        "422":
          description: |
            Validation error on question submission (such as PII in question
            or user already has a pending question)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
          headers:
            - $ref: "#/components/headers/WriteRateLimitHeaders"
        "429":
          $ref: "#/components/responses/TooManyWriteRequests"

  /conversation/{conversation_id}/questions/{question_id}/answer:
    get:
      summary: Look up the answer to a question
      description: |
        This endpoint is intended to be polled while awaiting an answer to a
        question
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: question_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/DeviceIdHeader"
      responses:
        "200":
          description: The answer is available and is returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Answer"
          headers:
            - $ref: "#/components/headers/ReadRateLimitHeaders"
        "202":
          description: The answer is still being generated
          headers:
            - $ref: "#/components/headers/ReadRateLimitHeaders"
        "404":
          description: Conversation or question do not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          headers:
            - $ref: "#/components/headers/ReadRateLimitHeaders"
        "429":
          $ref: "#/components/responses/TooManyReadRequests"

  /conversation/{conversation_id}/answers/{answer_id}/feedback:
    post:
      summary: Provide user feedback on an individual answer
      description: |
        A user can provide feedback on an answer defining it as useful or not,
        once a user has set this it cannot be changed or removed
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: answer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/DeviceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - useful
              properties:
                useful:
                  type: boolean
      responses:
        "201":
          description: Feedback successfully submitted
          headers:
            - $ref: "#/components/headers/WriteRateLimitHeaders"
        "422":
          description: Validation error processing the feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
          headers:
            - $ref: "#/components/headers/WriteRateLimitHeaders"
        "404":
          description: Conversation or answer does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          headers:
            - $ref: "#/components/headers/WriteRateLimitHeaders"
        "429":
          $ref: "#/components/responses/TooManyWriteRequests"

security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      description: |
        GOV.UK Signon issued bearer token which is used to authenticate the
        client application (e.g. GOV.UK App) and not an individual end user
      scheme: bearer
  responses:
    TooManyReadRequests:
      description: Too Many Requests to read endpoints.
      headers:
        - $ref: '#/components/headers/ReadRateLimitHeaders'
    TooManyWriteRequests:
      description: Too Many Requests to write endpoints.
      headers:
        - $ref: '#/components/headers/WriteRateLimitHeaders'
  parameters:
    DeviceIdHeader:
      name: Govuk-Chat-Client-Device-Id
      in: header
      required: false
      description: A unique client-side identifier used for throttling API requests per device.
      schema:
        type: string
  headers:
    ReadRateLimitHeaders:
      Token-Read-RateLimit-Limit:
        $ref: '#/components/headers/TokenReadRateLimitLimit'
      Token-Read-RateLimit-Remaining:
        $ref: '#/components/headers/TokenReadRateLimitRemaining'
      Token-Read-RateLimit-Reset:
        $ref: '#/components/headers/TokenReadRateLimitReset'
      DeviceId-Read-RateLimit-Limit:
        $ref: '#/components/headers/DeviceIdReadRateLimitLimit'
      DeviceId-Read-RateLimit-Remaining:
        $ref: '#/components/headers/DeviceIdReadRateLimitRemaining'
      DeviceId-Read-RateLimit-Reset:
        $ref: '#/components/headers/DeviceIdReadRateLimitReset'
    WriteRateLimitHeaders:
      Token-Write-RateLimit-Limit:
        $ref: '#/components/headers/TokenWriteRateLimitLimit'
      Token-Write-RateLimit-Remaining:
        $ref: '#/components/headers/TokenWriteRateLimitRemaining'
      Token-Write-RateLimit-Reset:
        $ref: '#/components/headers/TokenWriteRateLimitReset'
      DeviceId-Write-RateLimit-Limit:
        $ref: '#/components/headers/DeviceIdWriteRateLimitLimit'
      DeviceId-Write-RateLimit-Remaining:
        $ref: '#/components/headers/DeviceIdWriteRateLimitRemaining'
      DeviceId-Write-RateLimit-Reset:
        $ref: '#/components/headers/DeviceIdWriteRateLimitReset'
    TokenReadRateLimitLimit:
      description: The request limit for the token in the current period.
      schema:
        type: string
    TokenReadRateLimitRemaining:
      description: The number of remaining requests in the current period.
      schema:
        type: string
    TokenReadRateLimitReset:
      description: |
        Time remaining in seconds until first read request made in the period is removed from the count.
        If the token is currently at the limit, this is the time until next request can be made without returing
        a 429 Too Many Requests response.
      schema:
        type: string
    DeviceIdReadRateLimitLimit:
      description: The request limit for device ID-based reads in the current period.
      schema:
        type: string
    DeviceIdReadRateLimitRemaining:
      description: The number of remaining read requests for the device ID.
      schema:
        type: string
    DeviceIdReadRateLimitReset:
      description: |
          Time remaining in seconds until first read request made in the period is removed from the count.
          If the device ID is currently at the limit, this is the time until next request can be made without returing
          a 429 Too Many Requests response.
      schema:
        type: string
    TokenWriteRateLimitLimit:
      description: The request limit for token-based writes in the current period.
      schema:
        type: string
    TokenWriteRateLimitRemaining:
      description: The number of remaining write requests in the current period.
      schema:
        type: string
    TokenWriteRateLimitReset:
      description: |
        Time remaining in seconds until first write request made in the period is removed from the count.
        If the token is currently at the limit, this is the time until next request can be made without returing
        a 429 Too Many Requests response.
      schema:
        type: string
    DeviceIdWriteRateLimitLimit:
      description: The request limit for device ID-based writes in the current period.
      schema:
        type: string
    DeviceIdWriteRateLimitRemaining:
      description: The number of remaining write requests for the device ID.
      schema:
        type: string
    DeviceIdWriteRateLimitReset:
      description: |
        Time remaining in seconds until first write request made in the period is removed from the count.
        If the device ID is currently at the limit, this is the time until next request can be made without returing
        a 429 Too Many Requests response.
      schema:
        type: string
  schemas:
    UserQuestion:
      type: object
      required:
        - user_question
      properties:
        user_question:
          type: string
    Conversation:
      type: object
      required:
        - id
        - answered_questions
        - created_at
      properties:
        answered_questions:
          type: array
          items:
            $ref: "#/components/schemas/AnsweredQuestion"
        pending_question:
          $ref: "#/components/schemas/PendingQuestion"
        created_at:
          type: string
          format: date-time
    AnsweredQuestion:
      type: object
      required:
        - id
        - conversation_id
        - message
        - answer
        - created_at
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        message:
          description: The question the user provided in plain text
          type: string
        answer:
          $ref: "#/components/schemas/Answer"
        created_at:
          type: string
          format: date-time
    PendingQuestion:
      type: object
      required:
        - id
        - conversation_id
        - message
        - answer_url
        - created_at
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        message:
          description: The question the user provided in plain text
          type: string
        answer_url:
          description: |
            A URL that can be polled to check whether the answer is available
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
    Answer:
      type: object
      required:
        - id
        - created_at
        - message
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        message:
          description: |
            The LLM generated answer returned in markdown format.
          type: string
        useful:
          description: |
            Whether a user has flagged this answer as useful or not
          type: boolean
        sources:
          type: array
          items:
            $ref: "#/components/schemas/AnswerSource"
    AnswerSource:
      type: object
      required:
        - title
        - url
      properties:
        title:
          description: Title of the GOV.UK document used
          type: string
        heading:
          description: Heading of the section used for content
          type: string
        url:
          description: |
            URL of the page on GOV.UK that was used to generate answer
            with potentially a fragment to appropriate section
          type: string
          format: uri
    GenericError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    ValidationError:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
        errors:
          description: |
            an object structure of field name to an array of errors
          type: object
          additionalProperties:
            type: array
            items:
              type: string
